# 1. Create the scaffolding (e.g., a 50x50 crosshatch grid)
- operation: voronoi_dual
  settings:
    spacing: 20.0

- operation: connect_continuous
  settings:
    snap_distance: 0.1

- operation: simplify
  settings:
    tolerance: 0.1

- operation: optimize
  settings:
    start_x: 0.0
    start_y: 0.0
