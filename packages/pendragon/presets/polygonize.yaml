# 1. Generate an initial underlying pattern structure
- operation: guilloche
  settings:
    steps: 2000
    revolutions: 5.0
    p: 30

# 2. Extract closed cells from that pattern to turn them into solid boundaries
- operation: polygonize

# 3. Run a subsequent generation pass. It will automatically use the 
# new polygon boundary to clip and confine its generation framework.
- operation: grid_lines
  settings:
    spacing: 2.0
    orientation: crosshatch

# 4. Clean up the final toolpaths
- operation: optimize
  settings:
    start_x: 0.0
    start_y: 0.0
