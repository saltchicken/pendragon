# yaml-language-server: $schema=./recipe-schema.json

# 1. Create a hexagonal scaffolding grid
- operation: hexagon
  settings:
    radius: 10.0

- operation: add_boundary

# 3. Generate a spiral in every cell, modulating 'revolutions' via an image
- operation: generate_in_cells
  settings:
    generator: spiral
    auto_center: true
    keep_scaffolding: true

    # Static settings applied to every cell
    generator_settings:
      start_radius: 0.0
      end_radius: 3.8
      steps: 300

    # Dynamic modulation
    image_modulator:
      image_path: "images/loz.jpg"
      target_setting: "revolutions"
      min_val: 0.5 # Pure white areas get half a turn (barely visible)
      max_val: 12.0 # Pure black areas get a dense, dark 12-turn spiral

# 4. Standard path optimization
- operation: connect_continuous
  settings:
    snap_distance: 0.1

- operation: optimize
