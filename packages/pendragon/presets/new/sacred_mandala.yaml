# yaml-language-server: $schema=./recipe-schema.json

# 1. Generate the invisible guide tracks (circles)
- operation: concentric
  settings:
    sides: 64
    min_radius: 15.0
    max_radius: 95.0
    spacing: 15.0

# 2. Stamp hexagons along the length of those circles
- operation: distribute_along
  settings:
    generator: hexagon
    spacing: 12.0
    generator_settings:
      radius: 4.5

# 3. Merge intersecting stamps into continuous boundary outlines
- operation: merge
  settings:
    precision: 0.0

# 4. Standard CNC Cleanup
- operation: connect_continuous
  settings:
    snap_distance: 0.1
- operation: optimize
