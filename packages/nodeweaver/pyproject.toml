[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "nodeweaver"
version = "0.1.0"
description = "A universal, domain-agnostic pipeline and state machine engine."
requires-python = ">=3.10"
dependencies = [
    "pydantic",
    "loguru"
]

[tool.setuptools.packages.find]
where = ["src"]
