- operation: add_boundary
- operation: subdivide_lines # Crucial! Non-linear math needs vertices to bend.
  settings:
    max_length: 2.0 # Chop long lines into 2mm segments
- operation: ifs
  settings:
    iterations: 4
    transforms:
      # Branch 1: Shrink and keep normal
      - matrix: [0.6, -0.2, 0.2, 0.6, 20.0, 20.0]
        variation: linear

      # Branch 2: Shrink, shift, and turn into a fluid swirl
      - matrix: [0.5, 0.5, -0.5, 0.5, 100.0, 50.0]
        variation: swirl

      # Branch 3: Invert inside-out
      - matrix: [0.3, 0.0, 0.0, 0.3, 80.0, 80.0]
        variation: spherical
