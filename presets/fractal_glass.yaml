# yaml-language-server: $schema=./recipe-schema.json

# 1. Generate the "lead" lines of the stained glass
- operation: voronoi_dual
  settings:
    spacing: 40.0 # Large spacing creates broad, distinct glass shards
    mode: voronoi
    seed: 88 # Change this for different shard layouts

# 2. Close the raw Voronoi lines into distinct geometric panes
- operation: add_boundary
# - operation: polygonize

# 3. Fill every pane with an isolated, clipping-aware fractal
- operation: generate_in_cells
  settings:
    generator: hilbert
    keep_scaffolding: true # CRITICAL: Keeps the outer Voronoi shard boundaries
    auto_center: true
    generator_settings:
      spacing: 1.5 # Tight spacing for a dense, mesmerizing fill

# 4. Standard CNC Path Cleanup & Optimization
- operation: deduplicate
  settings:
    tolerance: 0.001

- operation: merge

- operation: connect_continuous
  settings:
    snap_distance: 0.1

- operation: simplify
  settings:
    tolerance: 0.1
    preserve_topology: false

- operation: optimize
  settings:
    start_x: 0.0
    start_y: 0.0
