# yaml-language-server: $schema=./recipe-schema.json

- operation: guilloche
  settings:
    overscan: 0
    group_boundaries: false
    R: 50
    r: 35
    p: 25
    steps: 1000
    revolutions: 10
    amplitude_mod: 0
    frequency_mod: 0

- operation: connect_continuous
  settings:
    snap_distance: 0.1

# Critical: Removes collinear vertices created by the step-by-step growth
- operation: simplify
  settings:
    tolerance: 0.2

- operation: scale
  settings:
    factor: 2

- operation: optimize
  settings:
    start_x: 0.0
    start_y: 0.0
