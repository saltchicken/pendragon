# yaml-language-server: $schema=./recipe-schema.json

# Test with a low polygon count to draw nesting hexagons (6 sides)
- operation: photo_wave
  settings:
    overscan: 0
    lines: 80
    amp: 2
    image_path: "images/loz.jpg"

- operation: connect_continuous
  settings:
    snap_distance: 0.1

- operation: optimize
  settings:
    start_x: 0.0
    start_y: 0.0
