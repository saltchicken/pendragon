- operation: grid_lines
  settings:
    spacing: 10
    orientation: crosshatch

- operation: image_mask
  settings:
    mask_image: images/loz.jpg
    threshold: 0.85

- operation: simplify
  settings:
    tolerance: 0.5
    preserve_topology: false

- operation: optimize
  settings:
    start_x: 0.0
    start_y: 0.0
