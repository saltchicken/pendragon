# yaml-language-server: $schema=./recipe-schema.json

- operation: venation
  settings:
    num_leaves: 500
    root_x: 0.0 # Move the root to match your DXF coordinates
    root_y: 0.0
    attract_distance: 50.0 # Increase to ensure it sees the leaves

- operation: connect_continuous
  settings:
    snap_distance: 0.1

# Critical: Removes collinear vertices created by the step-by-step growth
- operation: simplify
  settings:
    tolerance: 0.2

- operation: optimize
  settings:
    start_x: 0.0
    start_y: 0.0
