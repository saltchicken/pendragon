# yaml-language-server: $schema=./recipe-schema.json

- operation: grid_lines
  settings:
    overscan: 0
    spacing: 50.0
    orientation: crosshatch

- operation: generate_in_cells
  settings:
    generator: venation
    auto_center: true
    keep_scaffolding: true
    generator_settings:
      num_leaves: 800
      kill_distance: 3.0
      attract_distance: 25.0
      segment_length: 1.5
      root_x: 200.0
      root_y: 100.0
      seed: 123

# Critical: Stitches the thousands of tiny growth segments into smooth continuous paths
- operation: connect_continuous
  settings:
    snap_distance: 0.1

# Critical: Removes collinear vertices created by the step-by-step growth
- operation: simplify
  settings:
    tolerance: 0.2

- operation: optimize
  settings:
    start_x: 0.0
    start_y: 0.0
